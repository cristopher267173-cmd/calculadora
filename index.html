<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de propinas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div class="Calculadora">
        <h1> calculadora de propinas</h1>

        <label for="cuenta">total de la cuenta (Q):</label>
        <input type="number" id="cuenta" placeholder="Ej: 100" min="0">
        
        <label for="porcentaje">porcentaje de propinas:</label>
        <select id="porcentaje">
            <option value="10">20%</option>
            <option value="15">15%</option>
            <option value="20"select>20%</option>
            <option value="25">25%</option>
        </select>

        <label for="personas">numero de personas:</label>
        <input type="number"  id="personas" placeholder="Ej 4" min="1" value="1">

        <button onclick="calcular()">Orlando</button>

        <div class="resultado" id="resultado">
            <p>propina: <span id="propina"></span></p>
            <p>total: <span id="total"></span></p>
            <p>porPersona: <span id="porPersona"></span></p>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
